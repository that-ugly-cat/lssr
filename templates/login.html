{% extends "base.html" %}
{% block title %}Log in — LSSR{% endblock %}
{% block body %}
<div style="max-width: 360px; margin: 8vh auto 0;">
  <h1 style="text-align:center;">LSSR</h1>
  <p class="muted small" style="text-align:center; margin-top:-8px;">Living Systematic Scoping Review</p>
  {% if error %}<div class="flash flash-error" style="display:block;">Invalid email or password.</div>{% endif %}
  <form method="post" action="/login" class="card">
    <label>Email
      <input type="email" name="email" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button class="btn btn-primary" type="submit" style="width:100%; margin-top:12px;">Log in</button>
  </form>
</div>
{% endblock %}
